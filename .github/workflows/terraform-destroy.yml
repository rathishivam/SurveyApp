name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Terraform folder to destroy"
        required: true
        type: choice
        options:
          - infrastructure
          - deployment

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    environment:
      name: destroy

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: arn:aws:iam::779403607170:role/GithubActionsAssumeRole
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init
        working-directory: terraform/dev/${{ github.event.inputs.folder }}
        run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: terraform/dev/${{ github.event.inputs.folder }}
        run: terraform destroy -auto-approve -var-file=../terraform.tfvars
